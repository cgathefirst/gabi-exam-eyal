on: push
name: Slack Notification Demo
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/slack-demo:latest
            ${{ vars.DOCKERHUB_USERNAME }}/slack-demo:${{ github.sha }}

          
  slackNotification:
    name: Slack Notification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2.3.3
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_MESSAGE: "Workflow ${{ github.workflow }} has completed. Tagged image: ${{ vars.DOCKERHUB_USERNAME }}/slack-demo:${{ github.sha }} Has been pushed"
  
  helm-template:
    name: Helm Template
    needs: docker
    
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
      
    - name: Helm Template
      run: helm template "${{ github.event.repository.name }}" ./helmcharts  > "${{ github.event.repository.name }}".yaml

    - name: Print Helm Template
      run: cat "${{ github.event.repository.name }}".yaml

  slackNotification-helmTemplate:
    name: Slack Notification
    needs: helm-template
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Slack Notification
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_MESSAGE: "Helm template created successfully"
