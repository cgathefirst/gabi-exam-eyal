apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deploy
spec:
  selector: 
    matchLabels:
      app: {{ .Release.Name }}
  replicas: {{ .Values.replicas }}   #from values
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: {{ .Release.Name }} #from values
        image: {{ .Values.image.repository}}:{{ .Values.image.tag }} #from values
        ports:
        - containerPort: {{ .Values.target_port }}